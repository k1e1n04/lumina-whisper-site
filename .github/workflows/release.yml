name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.3.0)'
        required: true

jobs:
  build-and-release:
    runs-on: macos-15

    steps:
      - name: Checkout lumina-whisper-site
        uses: actions/checkout@v4

      - name: Checkout lumina-whisper (private)
        uses: actions/checkout@v4
        with:
          repository: k1e1n04/lumina-whisper
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: lumina-whisper

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build and create DMG
        run: |
          cd lumina-whisper
          bash scripts/create-dmg.sh --version ${{ github.event.inputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: LuminaWhisper v${{ github.event.inputs.version }}
          files: lumina-whisper/build/LuminaWhisper-${{ github.event.inputs.version }}.dmg
          body: |
            ## LuminaWhisper v${{ github.event.inputs.version }}

            詳細は [リリースノート](https://k1e1n04.github.io/lumina-whisper-site/#/release) をご覧ください。
